<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Oscuro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="back-button">
        <a href="../index.html">← Atrás</a>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="card-glow"></div>
            
            <div class="login-header">
                <div class="brand">
                    <span class="brand-icon">◆</span>
                    <span class="brand-text">SecureApp</span>
                </div>
            </div>

            <h1 class="title">Bienvenido</h1>
            <p class="subtitle">Inicia sesión en tu cuenta</p>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                    </div>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error" id="passwordError"></span>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox">
                        <span>Continuar con sesión iniciada</span>
                    </label>
                    <a href="#">Recupera tu acceso</a>
                </div>

                <button type="submit" class="btn-login">
                    <span>Iniciar Sesión</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="divider">
                <span>O accede con</span>
            </div>

            <div class="social-buttons">
                <button class="social-btn" title="Google">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn" title="GitHub">
                    <i class="fab fa-github"></i>
                </button>
                <button class="social-btn" title="Microsoft">
                    <i class="fab fa-microsoft"></i>
                </button>
            </div>

            <div class="footer">
                <p>¿No tienes cuenta? <a href="#">Crear cuenta</a></p>
            </div>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script src="../interactive-bg.js"></script>
    <script src="script.js"></script>
</body>
</html>
