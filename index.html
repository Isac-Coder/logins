<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
display:flex;
flex-wrap:wrap;
gap:40px;
padding:40px;
justify-content:center;
}

/* estructura base */

.form{
width:280px;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.form h2{
text-align:center;
margin-bottom:15px;
}

.form input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

.form button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

/* register-clasico */

.clasico{
background:white;
}

.clasico button{
background:#007bff;
color:white;
}

/* register-moderno */

.moderno{
background:#ffffff;
border-top:5px solid #4CAF50;
}

.moderno button{
background:#4CAF50;
color:white;
}

/* register-gradiente */

.gradiente{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.gradiente input{
border:none;
}

.gradiente button{
background:white;
color:#333;
}

/* register-oscuro */

.oscuro{
background:#1e1e1e;
color:white;
}

.oscuro input{
background:#333;
border:none;
color:white;
}

.oscuro button{
background:#ff9800;
color:white;
}

/* register-signup */

.signup{
background:#fff;
border-radius:20px;
}

.signup button{
background:#e91e63;
color:white;
}

/* register-glassmorphism */

.glass{
background:rgba(255,255,255,0.2);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.3);
}

.glass button{
background:#6c63ff;
color:white;
}

</style>
</head>

<body>

<!-- register-clasico -->

<div class="form clasico">
<h2>register-clasico</h2>
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="registrar()">Registrar</button>
</div>

<!-- register-moderno -->

<div class="form moderno">
<h2>register-moderno</h2>
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="registrar()">Registrar</button>
</div>

<!-- register-gradiente -->

<div class="form gradiente">
<h2>register-gradiente</h2>
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="registrar()">Registrar</button>
</div>

<!-- register-oscuro -->

<div class="form oscuro">
<h2>register-oscuro</h2>
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="registrar()">Registrar</button>
</div>

<!-- register-signup -->

<div class="form signup">
<h2>register-signup</h2>
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="registrar()">Sign Up</button>
</div>

<!-- register-glassmorphism -->

<div class="form glass">
<h2>register-glassmorphism</h2>
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="registrar()">Registrar</button>
</div>

<script>

function registrar(){
alert("Registro enviado correctamente");
}

</script>

</body>
</html>
